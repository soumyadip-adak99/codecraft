events {
    worker_connections 1024;
}

http {
    # ── Upstream cluster — add/remove app instances here ──────────────────────
    upstream codecraft_cluster {
        least_conn;                          # route to least-busy instance
        server app1:3000 weight=1;
        server app2:3000 weight=1;
        server app3:3000 weight=1;

        keepalive 32;                        # keep connections alive to backend
    }

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # 10 MB shared memory, 10 req/s per unique IP
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
    # Tighter limit for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_zone:5m  rate=3r/s;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct="$upstream_connect_time" uht="$upstream_header_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance tweaks ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    server {
        listen 80;
        server_name _;

        # ── Redirect HTTP → HTTPS in production ───────────────────────────────
        # Uncomment when TLS is configured:
        # return 301 https://$host$request_uri;

        # ── Health check endpoint (Nginx itself) ──────────────────────────────
        location /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Static assets — long cache, direct proxy ──────────────────────────
        location /_next/static/ {
            proxy_pass         http://codecraft_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
        }

        # ── Auth routes — tighter rate limits ─────────────────────────────────
        location /api/auth/ {
            limit_req  zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass             http://codecraft_cluster;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── LLM + code execution — standard rate limit ────────────────────────
        location ~ ^/api/(llm|code)/ {
            limit_req  zone=api_zone burst=20 nodelay;
            limit_req_status 429;

            proxy_pass             http://codecraft_cluster;
            proxy_http_version     1.1;
            proxy_read_timeout     120s;   # LLM calls can be slow
            proxy_set_header       Connection "";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── All other routes ──────────────────────────────────────────────────
        location / {
            proxy_pass             http://codecraft_cluster;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade     $http_upgrade;
            proxy_set_header       Connection  "upgrade";
            proxy_set_header       Host        $host;
            proxy_set_header       X-Real-IP   $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_cache_bypass     $http_upgrade;

            # ── Retry on upstream errors ──────────────────────────────────────
            proxy_next_upstream    error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }
    }

    # ── HTTPS server (uncomment + add certs for production) ──────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     include             /etc/nginx/conf.d/*.conf;
    # }
}
