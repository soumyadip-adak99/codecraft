version: "3.9"

services:

  nextjs-app:
    build: .
    container_name: ${APPLICATION_CONTAINER_NAME}
    ports:
      - "3000:3000"
    restart: always
    environment:
      NODE_ENV: production
      MONGO_URL: ${MONGODB_URI}
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: